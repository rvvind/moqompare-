<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>moqompare — HLS vs MoQ</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2a2d3a;
      --accent-hls: #3b82f6;
      --accent-moq: #a855f7;
      --text: #e2e8f0;
      --text-muted: #64748b;
      --good: #22c55e;
      --warn: #f59e0b;
      --bad: #ef4444;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 13px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ─────────────────────────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    header h1 { font-size: 15px; font-weight: 600; letter-spacing: 0.05em; }
    header h1 span.hls { color: var(--accent-hls); }
    header h1 span.moq { color: var(--accent-moq); }
    .phase-badge {
      background: var(--border);
      color: var(--text-muted);
      border-radius: 4px;
      padding: 3px 8px;
      font-size: 11px;
    }

    /* ── Impairment bar ──────────────────────────────────────────────────── */
    .impairment-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }
    .impairment-bar label {
      color: var(--text-muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .impair-btn {
      background: var(--border);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 4px 12px;
      cursor: pointer;
      font-family: inherit;
      font-size: 12px;
      transition: background 0.15s;
    }
    .impair-btn:hover { background: #333649; }
    .impair-btn.active { border-color: var(--warn); color: var(--warn); }
    #current-profile { margin-left: auto; color: var(--good); font-size: 12px; }

    /* ── Players ─────────────────────────────────────────────────────────── */
    .players {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1px;
      background: var(--border);
      flex: 1;
    }
    .player-panel {
      background: var(--bg);
      display: flex;
      flex-direction: column;
    }
    .player-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
    }
    .proto-label {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .proto-label.hls { color: var(--accent-hls); }
    .proto-label.moq { color: var(--accent-moq); }

    /* ── Metrics row ─────────────────────────────────────────────────────── */
    .player-metrics {
      display: flex;
      gap: 16px;
      margin-left: auto;
    }
    .metric { display: flex; flex-direction: column; align-items: flex-end; }
    .metric-value { font-size: 15px; font-weight: 600; color: var(--text); }
    .metric-label {
      font-size: 10px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    /* ── Video area ──────────────────────────────────────────────────────── */
    .video-area {
      flex: 1;
      position: relative;
      background: #080a10;
      min-height: 300px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    video {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: contain;
    }

    /* Shown while video hasn't started yet */
    .video-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      pointer-events: none;
    }
    .video-overlay.hidden { display: none; }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--accent-hls);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .overlay-msg { color: var(--text-muted); font-size: 12px; }

    /* hang-watch fills the video area like a <video> element */
    hang-watch {
      width: 100%;
      height: 100%;
      display: block;
      background: #080a10;
    }
    hang-watch canvas {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    /* ── Error banner ────────────────────────────────────────────────────── */
    #hls-error {
      display: none;
      position: absolute;
      bottom: 10px; left: 10px; right: 10px;
      background: rgba(239,68,68,0.15);
      border: 1px solid var(--bad);
      color: var(--bad);
      padding: 6px 10px;
      border-radius: 4px;
      font-size: 11px;
    }

    /* ── Event timeline ──────────────────────────────────────────────────── */
    .timeline-section {
      border-top: 1px solid var(--border);
      background: var(--surface);
      padding: 10px 20px;
      max-height: 140px;
    }
    .timeline-section h2 {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 8px;
    }
    .event-list {
      list-style: none;
      overflow-y: auto;
      max-height: 90px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .event-list li { display: flex; gap: 10px; font-size: 11px; }
    .event-list li .ts { color: var(--text-muted); min-width: 70px; }
    .event-list li .ev { color: var(--text); }
    .event-list li.warn .ev { color: var(--warn); }
    .event-list li.bad  .ev { color: var(--bad); }
    .event-list li.good .ev { color: var(--good); }
  </style>
</head>
<body>

  <!-- ── Header ──────────────────────────────────────────────────────────── -->
  <header>
    <h1>moqompare &mdash; <span class="hls">HLS</span> vs <span class="moq">MoQ</span></h1>
    <span class="phase-badge">Phase 3 &mdash; Impairment Injection</span>
  </header>

  <!-- ── Impairment bar ──────────────────────────────────────────────────── -->
  <div class="impairment-bar">
    <label>Impairment:</label>
    <button class="impair-btn active" data-profile="baseline" onclick="setProfile('baseline')">Baseline</button>
    <button class="impair-btn" data-profile="jitter" onclick="setProfile('jitter')">Jitter + Loss</button>
    <button class="impair-btn" data-profile="squeeze" onclick="setProfile('squeeze')">Bandwidth Squeeze</button>
    <button class="impair-btn" data-profile="outage" onclick="setProfile('outage')">Burst Outage</button>
    <span id="current-profile">&#9679; baseline</span>
  </div>

  <!-- ── Side-by-side players ────────────────────────────────────────────── -->
  <div class="players">

    <!-- HLS panel -->
    <div class="player-panel">
      <div class="player-header">
        <span class="proto-label hls">HLS</span>
        <div class="player-metrics">
          <div class="metric">
            <span class="metric-value" id="hls-resolution">—</span>
            <span class="metric-label">Resolution</span>
          </div>
          <div class="metric">
            <span class="metric-value" id="hls-bitrate">—</span>
            <span class="metric-label">Bitrate</span>
          </div>
          <div class="metric">
            <span class="metric-value" id="hls-latency">—</span>
            <span class="metric-label">Latency</span>
          </div>
          <div class="metric">
            <span class="metric-value" id="hls-startup">—</span>
            <span class="metric-label">Startup</span>
          </div>
          <div class="metric">
            <span class="metric-value" id="hls-stalls">0</span>
            <span class="metric-label">Stalls</span>
          </div>
        </div>
      </div>
      <div class="video-area">
        <video id="hls-video" muted playsinline></video>

        <!-- spinner shown while buffering -->
        <div class="video-overlay" id="hls-overlay">
          <div class="spinner"></div>
          <span class="overlay-msg" id="hls-status">Connecting to HLS stream…</span>
        </div>

        <!-- error banner -->
        <div id="hls-error"></div>
      </div>
    </div>

    <!-- MoQ panel (placeholder — Phase 2) -->
    <div class="player-panel">
      <div class="player-header">
        <span class="proto-label moq">MoQ</span>
        <div class="player-metrics">
          <div class="metric">
            <span class="metric-value" id="moq-resolution">—</span>
            <span class="metric-label">Resolution</span>
          </div>
          <div class="metric">
            <span class="metric-value" id="moq-bitrate">—</span>
            <span class="metric-label">Bitrate</span>
          </div>
          <div class="metric">
            <span class="metric-value" id="moq-latency">—</span>
            <span class="metric-label">Latency</span>
          </div>
          <div class="metric">
            <span class="metric-value" id="moq-startup">—</span>
            <span class="metric-label">Startup</span>
          </div>
          <div class="metric">
            <span class="metric-value" id="moq-stalls">—</span>
            <span class="metric-label">Stalls</span>
          </div>
        </div>
      </div>
      <div class="video-area">
        <hang-watch id="moq-watch" muted latency="4500">
          <canvas></canvas>
        </hang-watch>
        <div class="video-overlay" id="moq-overlay">
          <div class="spinner" style="border-top-color:var(--accent-moq)"></div>
          <span class="overlay-msg" id="moq-status">Connecting to MoQ relay…</span>
        </div>
      </div>
    </div>

  </div>

  <!-- ── Event timeline ──────────────────────────────────────────────────── -->
  <div class="timeline-section">
    <h2>Event Timeline</h2>
    <ul class="event-list" id="event-list"></ul>
  </div>

  <script src="/hls.min.js"></script>
  <script>
    // ── Helpers ────────────────────────────────────────────────────────────
    function now() {
      return new Date().toISOString().slice(11, 19) + ' UTC';
    }

    function addEvent(text, type) {
      const list = document.getElementById('event-list');
      const li   = document.createElement('li');
      if (type) li.className = type;
      li.innerHTML =
        '<span class="ts">' + now() + '</span>' +
        '<span class="ev">' + text + '</span>';
      list.prepend(li);
      // cap timeline at 50 entries
      while (list.children.length > 50) list.removeChild(list.lastChild);
    }

    function setText(id, val) {
      const el = document.getElementById(id);
      if (el) el.textContent = val;
    }

    function setStatus(msg) {
      setText('hls-status', msg);
    }

    // ── Impairment UI ──────────────────────────────────────────────────────
    const impairBtns = document.querySelectorAll('.impair-btn');
    const profileEl  = document.getElementById('current-profile');

    function _setActiveBtn(name) {
      impairBtns.forEach(b => b.classList.remove('active'));
      impairBtns.forEach(b => {
        if (b.dataset.profile === name) b.classList.add('active');
      });
      profileEl.textContent = '\u25CF ' + name;
      profileEl.style.color = name === 'baseline' ? 'var(--good)' : 'var(--warn)';
    }

    function setProfile(name) {
      _setActiveBtn(name);
      fetch('/impair/' + name, { method: 'POST' })
        .then(r => r.json())
        .then(function (d) {
          if (d.ok) {
            const label = { baseline: 'cleared', jitter: '30 ms ±20 ms + 1% loss',
                            squeeze: '500 kbps cap', outage: '100% loss / 5 s' }[name] || name;
            addEvent('impairment \u2192 ' + name + ' (' + label + ')', name === 'baseline' ? 'good' : 'warn');
            if (d.auto_clear_secs) {
              setTimeout(function () {
                _setActiveBtn('baseline');
                addEvent('impairment \u2192 baseline (outage cleared)', 'good');
              }, d.auto_clear_secs * 1000);
            }
          } else {
            addEvent('impairment error: ' + (d.errors || []).join('; '), 'bad');
          }
        })
        .catch(function (e) {
          addEvent('impairment request failed: ' + e.message, 'bad');
        });
    }

    // ── HLS player ─────────────────────────────────────────────────────────
    const HLS_URL = '/hls/stream.m3u8';
    const video   = document.getElementById('hls-video');
    const overlay = document.getElementById('hls-overlay');
    const errEl   = document.getElementById('hls-error');

    let startTs   = null;   // performance.now() when play() was called
    let stallCount = 0;
    let startupRecorded = false;

    if (!Hls.isSupported()) {
      // Fallback: Safari native HLS
      if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = HLS_URL;
        video.play();
        addEvent('using native HLS (Safari)', 'warn');
      } else {
        setStatus('HLS not supported in this browser');
        addEvent('HLS not supported', 'bad');
      }
    } else {
      const hls = new Hls({
        liveSyncDurationCount:      3,   // stay ~3 segments behind live edge
        liveMaxLatencyDurationCount: 6,
        maxBufferLength:            10,
        enableWorker:               true,
        lowLatencyMode:             false,
      });

      hls.loadSource(HLS_URL);
      hls.attachMedia(video);

      // ── Startup ────────────────────────────────────────────────────────
      hls.on(Hls.Events.MANIFEST_PARSED, function (_, data) {
        addEvent('manifest parsed — ' + data.levels.length + ' level(s)', 'good');
        setStatus('Buffering…');
        startTs = performance.now();
        video.play().catch(function (e) {
          addEvent('autoplay blocked: ' + e.message, 'warn');
          setStatus('Click video to start playback');
        });
      });

      // ── First frame ────────────────────────────────────────────────────
      video.addEventListener('playing', function () {
        overlay.classList.add('hidden');
        errEl.style.display = 'none';

        if (!startupRecorded && startTs !== null) {
          const ms = (performance.now() - startTs).toFixed(0);
          setText('hls-startup', ms + 'ms');
          startupRecorded = true;
          addEvent('HLS playing — startup ' + ms + 'ms', 'good');
        }

        // resolution available once first frame is decoded
        if (video.videoWidth) {
          setText('hls-resolution', video.videoWidth + '×' + video.videoHeight);
        }
      });

      // ── Stall / waiting ────────────────────────────────────────────────
      video.addEventListener('waiting', function () {
        overlay.classList.remove('hidden');
        setStatus('Rebuffering…');
        stallCount++;
        setText('hls-stalls', stallCount);
        addEvent('HLS stall #' + stallCount, 'warn');
      });

      // ── Bitrate computed from segment payload ──────────────────────────
      function fmtBitrate(bps) {
        if (bps >= 1000000) return (bps / 1000000).toFixed(1) + ' Mb/s';
        return Math.round(bps / 1000) + ' kb/s';
      }

      hls.on(Hls.Events.FRAG_LOADED, function (_, data) {
        const bytes = data.frag.stats.total;
        const dur   = data.frag.duration;
        if (dur > 0 && bytes > 0) {
          setText('hls-bitrate', fmtBitrate((bytes * 8) / dur));
        }
      });

      // ── ABR level switch ───────────────────────────────────────────────
      hls.on(Hls.Events.LEVEL_SWITCHED, function (_, data) {
        const lvl = hls.levels[data.level];
        if (lvl && lvl.bitrate) {
          addEvent('HLS level → ' + data.level + ' (' + fmtBitrate(lvl.bitrate) + ')', 'good');
        }
      });

      // ── Latency + resolution polling ───────────────────────────────────
      setInterval(function () {
        if (video.paused || video.readyState < 2) return;

        if (typeof hls.latency === 'number' && hls.latency > 0) {
          setText('hls-latency', hls.latency.toFixed(1) + 's');
        }
        if (video.videoWidth) {
          setText('hls-resolution', video.videoWidth + '×' + video.videoHeight);
        }
      }, 1000);

      // ── Errors ─────────────────────────────────────────────────────────
      hls.on(Hls.Events.ERROR, function (_, data) {
        if (data.fatal) {
          addEvent('HLS fatal: ' + data.details, 'bad');
          errEl.textContent = 'Error: ' + data.details + ' — retrying…';
          errEl.style.display = 'block';
          overlay.classList.remove('hidden');
          setStatus('Error — retrying…');

          switch (data.type) {
            case Hls.ErrorTypes.NETWORK_ERROR:
              hls.startLoad();
              break;
            case Hls.ErrorTypes.MEDIA_ERROR:
              hls.recoverMediaError();
              break;
            default:
              // unrecoverable — reload after 3 s
              setTimeout(function () { window.location.reload(); }, 3000);
          }
        } else {
          // non-fatal: count stalls on media errors
          if (data.type === Hls.ErrorTypes.MEDIA_ERROR) {
            stallCount++;
            setText('hls-stalls', stallCount);
            addEvent('HLS media error: ' + data.details, 'warn');
          }
        }
      });

      // ── Segment load logging ───────────────────────────────────────────
      let segCount = 0;
      hls.on(Hls.Events.FRAG_LOADED, function (_, data) {
        segCount++;
        // log every 10th segment to keep timeline readable
        if (segCount % 10 === 0) {
          const kb = (data.frag.stats.total / 1024).toFixed(0);
          addEvent('HLS seg #' + segCount + ' loaded (' + kb + ' KB)', 'good');
        }
      });
    }

    // ── Startup event ──────────────────────────────────────────────────────
    addEvent('page loaded — connecting to ' + HLS_URL, 'good');
  </script>

  <!-- MoQ player (hang-watch custom element, loaded as ES module) -->
  <!-- MoQ player (hang-watch custom element, loaded as ES module) -->
  <script type="module" src="/hang.js"></script>
  <script type="module">
    await customElements.whenDefined('hang-watch');

    const MOQ_URL  = 'http://' + window.location.hostname + ':4443';
    const MOQ_NAME = 'stream';

    const watchEl    = document.getElementById('moq-watch');
    const moqOverlay = document.getElementById('moq-overlay');

    watchEl.url  = new URL(MOQ_URL);
    watchEl.name = MOQ_NAME;

    addEvent('MoQ connecting to ' + MOQ_URL + ' / ' + MOQ_NAME);

    let moqStartTs     = performance.now();
    let moqStartupDone = false;
    let moqStallCount  = 0;
    let prevBroad      = null;

    // ── Poll broadcast status and canvas metrics ──────────────────────────
    setInterval(function () {
      const instance = watchEl.active ? watchEl.active.peek() : undefined;
      if (!instance) return;

      const broad = instance.broadcast.status
        ? instance.broadcast.status.peek()
        : undefined;

      if (broad !== prevBroad) {
        prevBroad = broad;

        if (broad === 'live') {
          moqOverlay.classList.add('hidden');
          if (!moqStartupDone) {
            moqStartupDone = true;
            const ms = (performance.now() - moqStartTs).toFixed(0);
            setText('moq-startup', ms + 'ms');
            addEvent('MoQ live — startup ' + ms + 'ms', 'good');
          }
        } else if (broad === 'loading') {
          moqOverlay.classList.remove('hidden');
          setText('moq-status', 'Buffering…');
          if (moqStartupDone) {
            moqStallCount++;
            setText('moq-stalls', moqStallCount);
            addEvent('MoQ stall #' + moqStallCount, 'warn');
          }
        } else if (broad === 'offline') {
          setText('moq-status', 'Waiting for broadcast…');
        }
      }

      // Resolution from canvas once video is rendering
      const canvas = watchEl.querySelector('canvas');
      if (canvas && canvas.width > 1) {
        setText('moq-resolution', canvas.width + '×' + canvas.height);
      }
    }, 500);
  </script>
</body>
</html>
