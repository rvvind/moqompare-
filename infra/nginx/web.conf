server {
    listen 80;
    server_name _;
    resolver 127.0.0.11 valid=10s ipv6=off;

    root /usr/share/nginx/html;
    index index.html;

    # ── HLS manifests → manifest-proxy (freeze-capable) ──────────────────
    # Regex location takes priority over the /hls/ prefix below.
    # manifest-proxy proxies to origin normally; POST /freeze makes it
    # serve frozen snapshots — simulating stale manifests for HLS players.
    # MoQ publishers read origin directly and are unaffected.
    location ~ ^/hls/.*\.m3u8$ {
        set $manifest_proxy_upstream manifest-proxy:8091;
        proxy_pass http://$manifest_proxy_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_no_cache         1;
        proxy_cache_bypass     1;
        add_header Cache-Control "no-cache, no-store" always;
        add_header Access-Control-Allow-Origin "*" always;
        proxy_connect_timeout 5s;
        proxy_read_timeout    10s;
    }

    # ── HLS segments → origin (direct, unaffected by manifest freeze) ────
    # Browser requests /hls/... → forwarded to the origin service.
    # Keeps everything on one port; avoids CORS complexity.
    location /hls/ {
        set $origin_upstream origin;
        proxy_pass http://$origin_upstream$request_uri;

        proxy_http_version 1.1;
        proxy_set_header Host $host;

        # No caching — live stream manifests must always be fresh
        proxy_no_cache         1;
        proxy_cache_bypass     1;
        add_header Cache-Control "no-cache, no-store" always;
        add_header Access-Control-Allow-Origin "*" always;

        # Increase timeouts for segment requests
        proxy_connect_timeout 5s;
        proxy_read_timeout    10s;
    }

    # ── Side-by-side comparison page ─────────────────────────────────────
    location = /compare {
        try_files /compare.html =404;
        add_header Cache-Control "no-cache";
    }

    # ── Fanout demo page ─────────────────────────────────────────────────
    location = /fanout {
        try_files /fanout.html =404;
        add_header Cache-Control "no-cache";
    }

    # ── Executive presentation routes ────────────────────────────────────
    location = /present {
        try_files /present.html =404;
        add_header Cache-Control "no-cache";
    }

    location = /present/control {
        return 302 $scheme://$http_host/present;
    }

    # ── Static files (hls.min.js, index.html, etc.) ──────────────────────
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    # ── Metrics collector proxy ───────────────────────────────────────────
    # Browser sends  POST /metrics/report  and reads  GET /metrics/metrics
    # → forwarded to the metrics collector on port 9090.
    location /metrics/ {
        set $metrics_upstream metrics:9090;
        rewrite ^/metrics/(.*)$ /$1 break;
        proxy_pass http://$metrics_upstream$uri$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        add_header Access-Control-Allow-Origin "*" always;
    }

    # ── Ad server proxy ───────────────────────────────────────────────────
    # Browser polls  GET /ad/status  and posts  POST /ad/trigger
    # → forwarded to the ad server on port 8092.
    location /ad/ {
        set $ad_upstream ad:8092;
        rewrite ^/ad/(.*)$ /$1 break;
        proxy_pass http://$ad_upstream$uri$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        add_header Cache-Control "no-cache, no-store" always;
        add_header Access-Control-Allow-Origin "*" always;
    }

    # ── Impairment API proxy ──────────────────────────────────────────────
    # Browser sends  POST /impair/<profile>  or  GET /impair/status
    # → forwarded to the impairment controller service on port 8090.
    location /impair/ {
        set $impairment_upstream impairment:8090;
        rewrite ^/impair/(.*)$ /impair/$1 break;
        proxy_pass http://$impairment_upstream$uri$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        add_header Access-Control-Allow-Origin "*" always;
    }

    # ── Health check ──────────────────────────────────────────────────────
    location /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
