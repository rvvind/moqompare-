# ─────────────────────────────────────────────
#  moqompare — HLS vs MoQ comparison lab
#  Phase 1: live source + HLS baseline
# ─────────────────────────────────────────────

networks:
  moqompare:
    driver: bridge

volumes:
  # Shared between source → packager → origin + publisher
  media:

services:

  # ── 1. Live source generator ──────────────────────────────────────────────
  # Generates testsrc2 video with UTC timestamp overlay.
  # Writes MPEG-TS into /media/source.pipe (named pipe).
  # Healthcheck: FIFO exists → packager can connect.
  source:
    build:
      context: ./source
    container_name: moqompare-source
    restart: unless-stopped
    volumes:
      - media:/media
    networks:
      - moqompare
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - SOURCE_FPS=${SOURCE_FPS:-30}
      - SOURCE_RESOLUTION=${SOURCE_RESOLUTION:-1280x720}
      - SOURCE_BITRATE=${SOURCE_BITRATE:-1500k}
      - HLS_SEGMENT_DURATION=${HLS_SEGMENT_DURATION:-2}
    healthcheck:
      test: ["CMD", "test", "-p", "/media/source.pipe"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s

  # ── 2. HLS packager ───────────────────────────────────────────────────────
  # Reads MPEG-TS from /media/source.pipe.
  # Muxes into fMP4 HLS segments at /media/hls/.
  # Healthcheck: stream.m3u8 exists (first segment written).
  packager:
    build:
      context: ./packager
    container_name: moqompare-packager
    restart: unless-stopped
    volumes:
      - media:/media
    networks:
      - moqompare
    depends_on:
      source:
        condition: service_healthy
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - HLS_SEGMENT_DURATION=${HLS_SEGMENT_DURATION:-2}
      - HLS_LIST_SIZE=${HLS_LIST_SIZE:-5}
    healthcheck:
      test: ["CMD", "test", "-f", "/media/hls/stream.m3u8"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 15s

  # ── 3. HLS HTTP origin ────────────────────────────────────────────────────
  # nginx serving /media/hls/ at /hls/.
  origin:
    image: nginx:alpine
    container_name: moqompare-origin
    restart: unless-stopped
    volumes:
      - media:/usr/share/nginx/html/hls:ro
      - ./infra/nginx/origin.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - moqompare
    ports:
      - "${ORIGIN_PORT:-8080}:80"
    depends_on:
      packager:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  # ── 4. MoQ publisher (placeholder) ───────────────────────────────────────
  publisher:
    image: alpine:3.19
    container_name: moqompare-publisher
    restart: unless-stopped
    command: >
      sh -c '
        echo "[publisher] placeholder: MoQ fragment publisher — not yet implemented";
        while true; do
          echo "[publisher] idle — $(date -u +%H:%M:%S)";
          sleep ${LOG_INTERVAL:-30};
        done
      '
    volumes:
      - media:/media:ro
    networks:
      - moqompare
    depends_on:
      packager:
        condition: service_healthy
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - RELAY_HOST=${RELAY_HOST:-relay}
      - RELAY_PORT=${RELAY_PORT:-4443}
      - LOG_INTERVAL=${LOG_INTERVAL:-30}
    healthcheck:
      test: ["CMD", "sh", "-c", "exit 0"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  # ── 5. MoQ relay (placeholder) ────────────────────────────────────────────
  relay:
    image: alpine:3.19
    container_name: moqompare-relay
    restart: unless-stopped
    command: >
      sh -c '
        echo "[relay] placeholder: MoQ relay — not yet implemented";
        while true; do
          echo "[relay] idle — $(date -u +%H:%M:%S)";
          sleep ${LOG_INTERVAL:-30};
        done
      '
    networks:
      - moqompare
    ports:
      - "${RELAY_PORT:-4443}:4443"
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - RELAY_PORT=${RELAY_PORT:-4443}
      - LOG_INTERVAL=${LOG_INTERVAL:-30}
    healthcheck:
      test: ["CMD", "sh", "-c", "exit 0"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  # ── 6. Browser UI ─────────────────────────────────────────────────────────
  # Built image bundles hls.js; nginx proxies /hls/ to origin.
  web:
    build:
      context: ./web
    container_name: moqompare-web
    restart: unless-stopped
    volumes:
      - ./infra/nginx/web.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - moqompare
    ports:
      - "${WEB_PORT:-3000}:80"
    depends_on:
      - origin
      - relay
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── 7. Metrics collector (placeholder) ────────────────────────────────────
  metrics:
    image: alpine:3.19
    container_name: moqompare-metrics
    restart: unless-stopped
    command: >
      sh -c '
        echo "[metrics] placeholder: metrics collector — not yet implemented";
        while true; do
          echo "[metrics] idle — $(date -u +%H:%M:%S)";
          sleep ${LOG_INTERVAL:-30};
        done
      '
    networks:
      - moqompare
    ports:
      - "${METRICS_PORT:-9090}:9090"
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - METRICS_PORT=${METRICS_PORT:-9090}
      - LOG_INTERVAL=${LOG_INTERVAL:-30}
    healthcheck:
      test: ["CMD", "sh", "-c", "exit 0"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
