# ─────────────────────────────────────────────
#  moqompare — HLS vs MoQ comparison lab
#  Phase 1: live source + HLS baseline
# ─────────────────────────────────────────────

networks:
  moqompare:
    driver: bridge

volumes:
  # Shared between source → packager → origin + publisher
  media:

services:

  # ── 1. Live source generator ──────────────────────────────────────────────
  # Generates testsrc2 video with UTC timestamp overlay.
  # Writes MPEG-TS into /media/source.pipe (named pipe).
  # Healthcheck: FIFO exists → packager can connect.
  source:
    build:
      context: ./source
    container_name: moqompare-source
    restart: unless-stopped
    volumes:
      - media:/media
      - ${VIDEOS_DIR:-./videos}:/videos:ro
    networks:
      - moqompare
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - SOURCE_FPS=${SOURCE_FPS:-30}
      - SOURCE_RESOLUTION=${SOURCE_RESOLUTION:-1280x720}
      - SOURCE_BITRATE=${SOURCE_BITRATE:-1500k}
      - HLS_SEGMENT_DURATION=${HLS_SEGMENT_DURATION:-2}
    healthcheck:
      test: ["CMD", "test", "-p", "/media/source.pipe"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s

  # ── 2. HLS packager ───────────────────────────────────────────────────────
  # Reads MPEG-TS from /media/source.pipe.
  # Muxes into fMP4 HLS segments at /media/hls/.
  # Healthcheck: stream.m3u8 exists (first segment written).
  packager:
    build:
      context: ./packager
    container_name: moqompare-packager
    restart: unless-stopped
    volumes:
      - media:/media
    networks:
      - moqompare
    depends_on:
      source:
        condition: service_healthy
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - HLS_SEGMENT_DURATION=${HLS_SEGMENT_DURATION:-2}
      - HLS_LIST_SIZE=${HLS_LIST_SIZE:-5}
      - SOURCE_BITRATE=${SOURCE_BITRATE:-4000k}
      - SOURCE_RESOLUTION=${SOURCE_RESOLUTION:-1920x1080}
      - ABR_LO_BITRATE=${ABR_LO_BITRATE:-500k}
      - ABR_LO_RESOLUTION=${ABR_LO_RESOLUTION:-640x360}
      - SOURCE_FPS=${SOURCE_FPS:-30}
    healthcheck:
      test: ["CMD", "test", "-f", "/media/hls/master.m3u8"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 15s

  # ── 3. HLS HTTP origin ────────────────────────────────────────────────────
  # nginx serving /media/hls/ at /hls/.
  origin:
    image: nginx:alpine
    container_name: moqompare-origin
    restart: unless-stopped
    volumes:
      - media:/usr/share/nginx/html:ro
      - ./infra/nginx/origin.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - moqompare
    ports:
      - "${ORIGIN_PORT:-8080}:80"
    depends_on:
      packager:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  # ── 4a. MoQ publisher — hi rendition ────────────────────────────────────
  # Publishes the hi-rendition (source resolution/bitrate) as broadcast
  # "stream_hi".  The JS ABR controller subscribes to this by default and
  # falls back to stream_lo when measured bandwidth drops below threshold.
  publisher-hi:
    build:
      context: ./publisher
    container_name: moqompare-publisher-hi
    restart: unless-stopped
    command: >
      publish
      --url http://relay:4443
      --name stream_hi
      hls
      --playlist http://origin/hls/master_hi.m3u8
    networks:
      - moqompare
    depends_on:
      origin:
        condition: service_healthy
      relay:
        condition: service_healthy
    environment:
      - MOQ_LOG_LEVEL=${LOG_LEVEL:-info}
    healthcheck:
      test: ["CMD", "sh", "-c", "exit 0"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  # ── 4b. MoQ publisher — lo rendition ────────────────────────────────────
  # Publishes the lo-rendition (640×360 @ ABR_LO_BITRATE) as broadcast
  # "stream_lo".  The JS ABR controller switches to this broadcast when
  # bandwidth falls below the hi-rendition threshold.
  publisher-lo:
    build:
      context: ./publisher
    container_name: moqompare-publisher-lo
    restart: unless-stopped
    command: >
      publish
      --url http://relay:4443
      --name stream_lo
      hls
      --playlist http://origin/hls/master_lo.m3u8
    networks:
      - moqompare
    depends_on:
      origin:
        condition: service_healthy
      relay:
        condition: service_healthy
    environment:
      - MOQ_LOG_LEVEL=${LOG_LEVEL:-info}
    healthcheck:
      test: ["CMD", "sh", "-c", "exit 0"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  # ── 5. MoQ relay ──────────────────────────────────────────────────────────
  # Built from source without jemalloc (the published image crashes on
  # Docker Desktop / macOS due to jemalloc profiling kernel requirements).
  # Serves QUIC/WebTransport on UDP 4443 and plain HTTP on TCP 4443
  # (used by clients to fetch the TLS certificate fingerprint).
  relay:
    build:
      context: ./relay
    container_name: moqompare-relay
    restart: unless-stopped
    networks:
      - moqompare
    ports:
      - "${RELAY_PORT:-4443}:4443/udp"
      - "${RELAY_PORT:-4443}:4443/tcp"
    volumes:
      - ./cluster_token:/cluster_token:ro
      - ./cluster_auth.jwk:/cluster_auth.jwk:ro
    environment:
      - MOQ_SERVER_BIND=[::]:4443
      - MOQ_SERVER_TLS_GENERATE=localhost,relay
      - MOQ_WEB_HTTP_LISTEN=[::]:4443
      - MOQ_AUTH_PUBLIC=
      - MOQ_AUTH_KEY=/cluster_auth.jwk
      - MOQ_CLUSTER_TOKEN=/cluster_token
      - MOQ_LOG_LEVEL=${LOG_LEVEL:-info}
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1:4443/certificate.sha256 | grep -qE '^[0-9a-f]{64}'"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s

  # ── 6. Browser UI ─────────────────────────────────────────────────────────
  # Built image bundles hls.js; nginx proxies /hls/ to origin.
  web:
    build:
      context: ./web
    container_name: moqompare-web
    restart: unless-stopped
    volumes:
      - ./infra/nginx/web.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - moqompare
    ports:
      - "${WEB_PORT:-3000}:80"
    depends_on:
      - origin
      - relay
      - impairment
      - metrics
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── 7. Impairment controller ──────────────────────────────────────────────
  # Privileged container with pid:host so it can nsenter into container
  # network namespaces and apply tc netem rules without modifying those images.
  #
  # Impairment targets:
  #   HLS_CONTAINER  (default: moqompare-web)   — nginx proxy between browser
  #                  and origin.  Impairs HLS delivery without touching the
  #                  publisher→origin ingest path (publisher reads origin
  #                  directly, not via web).  Targeting origin would also
  #                  degrade publisher ingest and starve the relay.
  #   RELAY_CONTAINER (default: moqompare-relay) — QUIC relay.  Impairs
  #                  outgoing MoQ objects to the browser.  Publisher pushes
  #                  INTO the relay so relay→publisher traffic is minimal
  #                  (QUIC ACKs only) and not meaningfully degraded.
  impairment:
    build:
      context: ./impairment
    container_name: moqompare-impairment
    restart: unless-stopped
    pid: host
    privileged: true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - moqompare
    environment:
      - HLS_CONTAINER=${HLS_CONTAINER:-moqompare-web}
      - RELAY_CONTAINER=${RELAY_CONTAINER:-moqompare-relay}
      - IMPAIR_PORT=8090
    depends_on:
      - origin
      - relay
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1:8090/status | grep -q profile"]
      interval: 5s
      timeout: 3s
      retries: 6
      start_period: 5s

  # ── 9. Fan-out subscriber simulator (Phase 6) ────────────────────────────
  # Spawns FANOUT_N concurrent moq-relay cluster nodes, each connecting to the
  # main relay as a cluster peer (simulating N concurrent subscribers).
  # Inactive by default — start with:  docker compose --profile fanout up -d fanout
  fanout:
    build:
      context: ./fanout
    container_name: moqompare-fanout
    restart: unless-stopped
    profiles:
      - fanout
    networks:
      - moqompare
    volumes:
      - ./cluster_token:/cluster_token:ro
    environment:
      - FANOUT_N=${FANOUT_N:-5}
      - FANOUT_RELAY_URL=http://relay:4443
      - FANOUT_BROADCAST=${FANOUT_BROADCAST:-stream}
      - FANOUT_REPORT_SECS=${FANOUT_REPORT_SECS:-10}
      - FANOUT_DURATION=${FANOUT_DURATION:-0}
      - FANOUT_CLUSTER_TOKEN=/cluster_token
    depends_on:
      - relay

  # ── 8. Metrics collector ──────────────────────────────────────────────────
  # Receives JSON metric reports from the browser (POST /report).
  # Exposes Prometheus metrics at GET /metrics and JSON snapshot at /snapshot.
  metrics:
    build:
      context: ./metrics
    container_name: moqompare-metrics
    restart: unless-stopped
    networks:
      - moqompare
    ports:
      - "${METRICS_PORT:-9090}:9090"
    environment:
      - METRICS_PORT=${METRICS_PORT:-9090}
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1:9090/health | grep -q ok"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
